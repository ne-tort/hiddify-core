name: CI
on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths-ignore:
      - '.vscode/'
      - 'appcast.xml'
  push:
    branches:
       - main
       - dev
       - v3
       - v4
    paths-ignore:
      - '.vscode/'
      - 'appcast.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  masque-gates:
    name: MASQUE Gates
    runs-on: ubuntu-latest
    if: "${{!contains(github.event.head_commit.message, 'release: version')}}"
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25.6
      - name: MASQUE unit and race gates
        run: |
          cd hiddify-sing-box
          go test ./protocol/masque ./transport/masque ./common/masque ./include -tags with_masque
          go test -race ./protocol/masque ./transport/masque -tags with_masque
      - name: MASQUE connect_ip production validation gate
        run: |
          cd hiddify-sing-box
          go test ./protocol/masque -tags with_masque -run TestEndpointRejectsConnectIPTCPTransportInTunOnlyMode
          MASQUE_EXPERIMENTAL_QUIC=1 go test ./protocol/masque ./transport/masque -tags with_masque -run 'TestEndpointRejectsQUICExperimentalWithoutEnv|TestApplyQUICExperimentalOptions'
          go test ./transport/masque -tags with_masque -run 'TestCoreClientFactoryConnectTCPCapabilityByTransport|TestConnectIPPacketSessionDatagramCeiling'
      - name: Build Linux sing-box for e2e stand
        run: |
          cd hiddify-sing-box
          mkdir -p ../../experiments/router/stand/l3router/artifacts
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags with_masque -o ../../experiments/router/stand/l3router/artifacts/sing-box-linux-amd64 ./cmd/sing-box
      - name: MASQUE gate preflight
        run: |
          cd experiments/router/stand/l3router
          test -f masque_stand_runner.py
          test -f docker-compose.masque-e2e.yml
          test -f configs/masque-client.json
          test -f configs/masque-client-connect-ip.json
      - name: Run MASQUE smoke gate via stand runner
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario all
      - name: Run MASQUE strict bulk gate (connect_ip 10/20/50 MiB)
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario tcp_ip --megabytes 10
          python masque_stand_runner.py --scenario tcp_ip --megabytes 20
          python masque_stand_runner.py --scenario tcp_ip --megabytes 50
      - name: Validate MASQUE smoke artifact contract
        run: |
          cd experiments/router/stand/l3router
          python - <<'PY'
          import json, pathlib, sys
          files = {
            "runtime/smoke_10kb_latest.json": ("connect_udp", 10240, 5000),
            "runtime/smoke_tcp_connect_stream_latest.json": ("connect_stream", 10240, 5000),
            "runtime/smoke_tcp_connect_ip_latest.json": ("connect_ip", 10240, 5000),
          }
          failures = []
          summary = pathlib.Path("runtime/masque_python_runner_summary.json")
          if not summary.exists():
            failures.append("runtime/masque_python_runner_summary.json: missing")
          else:
            summary_data = json.loads(summary.read_text(encoding="utf-8"))
            if str(summary_data.get("ok", "false")).lower() != "true":
              failures.append(f"summary: ok={summary_data.get('ok')}")
            if not summary_data.get("results"):
              failures.append("summary: results missing/empty")
            tcp_ip = next((r for r in summary_data.get("results", []) if r.get("scenario") == "tcp_ip"), None)
            if tcp_ip is None:
              failures.append("summary: tcp_ip result missing")
            else:
              obs_delta = (((tcp_ip.get("observability") or {}).get("delta")) or {})
              classified = int(obs_delta.get("connect_ip_engine_classified_total", 0) or 0)
              packet_tx = int(obs_delta.get("connect_ip_packet_tx_total", 0) or 0)
              write_fail = int(obs_delta.get("connect_ip_packet_write_fail_total", 0) or 0)
              read_exit = int(obs_delta.get("connect_ip_packet_read_exit_total", 0) or 0)
              if classified <= 0 and packet_tx <= 0:
                failures.append("summary: tcp_ip observability requires classified_total>0 or packet_tx_total>0")
              if write_fail != 0:
                failures.append(f"summary: tcp_ip packet_write_fail_total={write_fail} expected=0")
              if read_exit != 0:
                failures.append(f"summary: tcp_ip packet_read_exit_total={read_exit} expected=0")
          for rel, (mode, min_bytes, max_ms) in files.items():
            p = pathlib.Path(rel)
            if not p.exists():
              failures.append(f"{rel}: missing")
              continue
            data = json.loads(p.read_text(encoding="utf-8"))
            if data.get("mode") != mode:
              failures.append(f"{rel}: mode={data.get('mode')} expected={mode}")
            if str(data.get("result", "false")).lower() != "true":
              failures.append(f"{rel}: result={data.get('result')}, error_class={data.get('error_class')}")
            metrics = data.get("metrics", {})
            thresholds = data.get("thresholds", {})
            if int(thresholds.get("min_bytes", -1)) != min_bytes:
              failures.append(f"{rel}: thresholds.min_bytes={thresholds.get('min_bytes')} expected={min_bytes}")
            if int(thresholds.get("max_elapsed_ms", -1)) != max_ms:
              failures.append(f"{rel}: thresholds.max_elapsed_ms={thresholds.get('max_elapsed_ms')} expected={max_ms}")
            if int(metrics.get("bytes_received", 0)) < min_bytes:
              failures.append(f"{rel}: bytes_received={metrics.get('bytes_received')} expected>={min_bytes}")
            if int(metrics.get("elapsed_ms", max_ms + 1)) > max_ms:
              failures.append(f"{rel}: elapsed_ms={metrics.get('elapsed_ms')} expected<={max_ms}")
          if failures:
            print("MASQUE smoke contract failures:")
            for failure in failures:
              print(" -", failure)
            sys.exit(1)
          print("MASQUE smoke contract passed.")
          PY
      - name: TCP anti-bypass negative control
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
          docker compose -f docker-compose.masque-e2e.yml up -d --build
          docker compose -f docker-compose.masque-e2e.yml stop masque-server-core
          if python masque_stand_runner.py --scenario tcp_stream; then
            echo "TCP connect_stream unexpectedly passed with MASQUE server down"
            exit 1
          fi
      - name: CONNECT-IP anti-bypass negative control
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
          MASQUE_CLIENT_CONFIG=./configs/masque-client-connect-ip.json docker compose -f docker-compose.masque-e2e.yml up -d --build
          docker compose -f docker-compose.masque-e2e.yml stop masque-server-core
          if python masque_stand_runner.py --scenario tcp_ip; then
            echo "TCP connect_ip unexpectedly passed with MASQUE server down"
            exit 1
          fi
      - name: UDP anti-bypass negative control
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
          docker compose -f docker-compose.masque-e2e.yml up -d --build
          docker compose -f docker-compose.masque-e2e.yml stop masque-server-core
          if python masque_stand_runner.py --scenario udp; then
            echo "UDP smoke unexpectedly passed with MASQUE server down"
            exit 1
          fi
      - name: Collect MASQUE gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masque-gates-runtime
          path: experiments/router/stand/l3router/runtime/*.json
      - name: Stop MASQUE stand
        if: always()
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v

  run:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    permissions: write-all
    if: "${{!contains(github.event.head_commit.message, 'release: version')}}"
    with:
      upload-artifact: ${{ github.event_name == 'push' }}

  masque-nightly-perf:
    name: MASQUE Nightly Perf
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25.6
      - name: Build Linux sing-box for MASQUE stand
        run: |
          cd hiddify-sing-box
          mkdir -p ../../experiments/router/stand/l3router/artifacts
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags with_masque -o ../../experiments/router/stand/l3router/artifacts/sing-box-linux-amd64 ./cmd/sing-box
      - name: Run MASQUE perf matrix
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario all
          cp runtime/masque_python_runner_summary.json runtime/nightly_smoke_summary.json
          python masque_stand_runner.py --scenario real --mtu 1500 --iperf-rates 100M,250M,500M,750M --iperf-duration-sec 15
          cp runtime/masque_python_runner_summary.json runtime/nightly_real_perf_summary.json
          python masque_stand_runner.py --scenario tcp_ip --stress
          cp runtime/masque_python_runner_summary.json runtime/nightly_tcp_ip_stress_summary.json
      - name: Nightly anti-bypass controls
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
          docker compose -f docker-compose.masque-e2e.yml up -d --build
          docker compose -f docker-compose.masque-e2e.yml stop masque-server-core
          if python masque_stand_runner.py --scenario udp; then
            echo "Nightly anti-bypass failed: UDP smoke unexpectedly passed with MASQUE server down"
            exit 1
          fi
          if python masque_stand_runner.py --scenario tcp_stream; then
            echo "Nightly anti-bypass failed: TCP smoke unexpectedly passed with MASQUE server down"
            exit 1
          fi
          docker compose -f docker-compose.masque-e2e.yml down -v
          MASQUE_CLIENT_CONFIG=./configs/masque-client-connect-ip.json docker compose -f docker-compose.masque-e2e.yml up -d --build
          docker compose -f docker-compose.masque-e2e.yml stop masque-server-core
          if python masque_stand_runner.py --scenario tcp_ip; then
            echo "Nightly anti-bypass failed: TCP connect_ip negative control failed"
            exit 1
          fi
      - name: Evaluate MASQUE perf thresholds
        run: |
          cd experiments/router/stand/l3router
          python - <<'PY'
          import json, pathlib, sys

          failures = []
          for rel in (
            "runtime/nightly_smoke_summary.json",
            "runtime/nightly_real_perf_summary.json",
            "runtime/nightly_tcp_ip_stress_summary.json",
          ):
            p = pathlib.Path(rel)
            if not p.exists():
              failures.append(f"{rel}: missing")
              continue

            try:
              data = json.loads(p.read_text(encoding="utf-8"))
            except Exception as exc:
              failures.append(f"{rel}: invalid_json={exc}")
              continue

            if str(data.get("ok", "false")).lower() != "true":
              failures.append(f"{rel}: ok={data.get('ok')}")
            if not isinstance(data.get("results"), list) or not data["results"]:
              failures.append(f"{rel}: results missing/empty")

          real_summary = pathlib.Path("runtime/nightly_real_perf_summary.json")
          if real_summary.exists():
            data = json.loads(real_summary.read_text(encoding="utf-8"))
            results = data.get("results") or []
            if not results:
              failures.append("runtime/nightly_real_perf_summary.json: no results")
            else:
              real = results[0]
              if real.get("scenario") != "tcp_ip_iperf":
                failures.append(f"real scenario mismatch: {real.get('scenario')}")
              if int(real.get("stable_trial_count", 0)) < 1:
                failures.append("real perf: stable_trial_count < 1")
              highest = real.get("highest_stable")
              if not isinstance(highest, dict):
                failures.append("real perf: highest_stable missing")
              else:
                if float(highest.get("receiver_mbps", 0) or 0) <= 0:
                  failures.append(f"real perf: highest_stable.receiver_mbps={highest.get('receiver_mbps')}")

          if failures:
            print("MASQUE perf threshold failures:")
            for f in failures:
              print(" -", f)
            sys.exit(1)
          print("MASQUE perf thresholds passed.")
          PY
      - name: Upload MASQUE perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masque-nightly-perf-runtime
          path: experiments/router/stand/l3router/runtime/*.json
      - name: Stop MASQUE stand
        if: always()
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
      
