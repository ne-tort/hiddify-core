name: CI
on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths-ignore:
      - '.vscode/'
      - 'appcast.xml'
  push:
    branches:
       - main
       - dev
       - v3
       - v4
    paths-ignore:
      - '.vscode/'
      - 'appcast.xml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  masque-gates:
    name: MASQUE Gates
    runs-on: ubuntu-latest
    if: "${{!contains(github.event.head_commit.message, 'release: version')}}"
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25.6
      - name: MASQUE unit and race gates
        run: |
          cd hiddify-sing-box
          go test ./protocol/masque ./transport/masque ./common/masque ./include -tags with_masque
          go test -race ./protocol/masque ./transport/masque -tags with_masque
      - name: MASQUE fast regression gate (pre-docker blocking)
        run: |
          cd hiddify-sing-box
          go test ./transport/masque ./protocol/masque -tags with_masque
      - name: MASQUE fast integration contract gate (pre-docker)
        run: |
          cd hiddify-sing-box
          go test ./protocol/masque -tags with_masque -run TestEndpointRejectsConnectIPTCPTransportInTunOnlyMode
          go test ./common/masque -tags with_masque -run 'TestRuntimePolicyRejectClassAndObservabilityContract|TestRuntimeMalformedScopedFlowClassifiedAsCapability'
          go test -C third_party/connect-ip-go -run 'TestPacketTupleRejectsAmbiguousIPv6ExtensionChain' .
          MASQUE_EXPERIMENTAL_QUIC=1 go test ./protocol/masque ./transport/masque -tags with_masque -run 'TestEndpointRejectsQUICExperimentalWithoutEnv|TestApplyQUICExperimentalOptions'
          go test ./transport/masque -tags with_masque -run 'TestCoreClientFactoryConnectTCPCapabilityByTransport|TestConnectIPPacketSessionDatagramCeiling|TestBuildTemplatesApplyConnectIPFlowScope|TestBuildTemplatesRejectScopeWithoutTemplateVars|TestConnectIPObservabilitySnapshotPolicyReasonContract'
      - name: MASQUE lifecycle parity harness gate (pre-docker)
        run: |
          cd hiddify-sing-box
          go test ./common/masque -tags with_masque -run TestRuntimePeerRemoteCloseNotReadyClassifiedAsLifecycle
          go test ./transport/masque -tags with_masque -run TestClassifyError
          go test ./protocol/masque -tags with_masque -run TestConnectIPRouteAdvertisePeerCloseLifecycleParity
      - name: Build Linux sing-box for e2e stand
        run: |
          cd hiddify-sing-box
          mkdir -p ../../experiments/router/stand/l3router/artifacts
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags with_masque -o ../../experiments/router/stand/l3router/artifacts/sing-box-linux-amd64 ./cmd/sing-box
      - name: MASQUE gate preflight
        run: |
          cd experiments/router/stand/l3router
          test -f masque_stand_runner.py
          test -f docker-compose.masque-e2e.yml
          test -f configs/masque-client.json
          test -f configs/masque-client-connect-ip.json
      - name: Run MASQUE smoke gate via stand runner
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario all
      - name: Run MASQUE strict bulk gate (connect_ip 10/20/50 MiB)
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario tcp_ip --megabytes 10
          python masque_stand_runner.py --scenario tcp_ip --megabytes 20
          python masque_stand_runner.py --scenario tcp_ip --megabytes 50
      - name: Run MASQUE scoped CONNECT-IP gate
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario tcp_ip_scoped
      - name: MASQUE anti-bypass negative controls (typed helper)
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py \
            --run-anti-bypass-negative-control tcp_stream \
            --run-anti-bypass-negative-control udp \
            --run-anti-bypass-negative-control tcp_ip
      - name: Validate MASQUE smoke artifact contract
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_contract_validator.py --runtime-dir runtime --output runtime/masque_runtime_contract_latest.json
      - name: Validate runtime contract mandatory CI gates
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-schema
      - name: Validate anti-bypass parity rows gate
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-anti-bypass-parity-rows
      - name: Validate scoped/lifecycle parity rows gate
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-scoped-parity-rows
      - name: Collect MASQUE gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masque-gates-runtime
          path: experiments/router/stand/l3router/runtime/*.json
      - name: Stop MASQUE stand
        if: always()
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v

  run:
    uses: ./.github/workflows/build.yml
    secrets: inherit
    permissions: write-all
    if: "${{!contains(github.event.head_commit.message, 'release: version')}}"
    with:
      upload-artifact: ${{ github.event_name == 'push' }}

  masque-nightly-perf:
    name: MASQUE Nightly Perf
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          submodules: 'recursive'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25.6
      - name: Build Linux sing-box for MASQUE stand
        run: |
          cd hiddify-sing-box
          mkdir -p ../../experiments/router/stand/l3router/artifacts
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -tags with_masque -o ../../experiments/router/stand/l3router/artifacts/sing-box-linux-amd64 ./cmd/sing-box
      - name: Run MASQUE perf matrix
        run: |
          cd experiments/router/stand/l3router
          python masque_stand_runner.py --scenario all
          cp runtime/masque_python_runner_summary.json runtime/nightly_smoke_summary.json
          python masque_stand_runner.py --scenario real --mtu 1500 --iperf-rates 100M,250M,500M,750M --iperf-duration-sec 15
          cp runtime/masque_python_runner_summary.json runtime/nightly_real_perf_summary.json
          python masque_stand_runner.py --scenario tcp_ip --stress
          cp runtime/masque_python_runner_summary.json runtime/nightly_tcp_ip_stress_summary.json
      - name: Nightly anti-bypass controls
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py \
            --run-anti-bypass-negative-control udp \
            --run-anti-bypass-negative-control tcp_stream \
            --run-anti-bypass-negative-control tcp_ip
      - name: Validate nightly runtime contract
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_contract_validator.py --runtime-dir runtime --output runtime/masque_runtime_contract_latest.json
      - name: Validate nightly runtime contract mandatory gates
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-schema
      - name: Validate nightly anti-bypass parity rows gate
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-anti-bypass-parity-rows
      - name: Validate nightly scoped/lifecycle parity rows gate
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --contract runtime/masque_runtime_contract_latest.json --assert-scoped-parity-rows
      - name: Evaluate MASQUE perf thresholds
        run: |
          cd experiments/router/stand/l3router
          python masque_runtime_ci_gate_asserts.py --assert-nightly-perf-thresholds
      - name: Upload MASQUE perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masque-nightly-perf-runtime
          path: experiments/router/stand/l3router/runtime/*.json
      - name: Stop MASQUE stand
        if: always()
        run: |
          cd experiments/router/stand/l3router
          docker compose -f docker-compose.masque-e2e.yml down -v
      
